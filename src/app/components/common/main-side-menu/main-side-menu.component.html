<div class="sticky">
    <div class="app-sidebar__overlay" data-bs-toggle="sidebar"></div>
    <div class="app-sidebar">

        <app-side-menu-header></app-side-menu-header>
        <!-- Side Header -->

        <div class="main-sidemenu">
            <div class="slide-left disabled" id="slide-left">
                <svg fill="#7b8191" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13.293 6.293 7.586 12l5.707 5.707 1.414-1.414L10.414 12l4.293-4.293z" />
                </svg>
            </div>
            <ul class="side-menu">

                <li *ngFor="let item of menuList" class="slide">
                    <a  class="side-menu__item has-link" [routerLink]="'/'+item.menuUrl" routerLinkActive="active-menu">    
                        <i [class]="'side-menu__icon fe '+ item.menuIcon"></i>
                        <span class="side-menu__label">{{item.menuName}}</span>
                    </a>
                </li> 
            </ul>
            <div class="slide-right" id="slide-right">
                <svg fill="#7b8191" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.707 17.707 16.414 12l-5.707-5.707-1.414 1.414L13.586 12l-4.293 4.293z" />
                </svg>
            </div>
        </div>


    </div>
    <!--/APP-SIDEBAR-->
</div>
