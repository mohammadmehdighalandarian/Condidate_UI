<div *ngIf="!acceptLaws.hasAccepted">
 
  <div class="container pt-5">
    <div class="row">
      <div class="col-12 ">
        <div class="card">
          <div class="card-body">
            <div [innerHTML]="acceptLaws.contractText"></div>
            <form (ngSubmit)="setAcceptance()">
              <br>
              <label class="custom-control custom-checkbox-md">
                <input
                  class="custom-control-input"
                  type="checkbox"
                  [(ngModel)]="hasAccepted"
                />
                <span class="custom-control-label">می پذیرم</span>
              </label>
              <button type="submit" [disabled]="!hasAccepted" class="btn btn-primary mt-4 mb-0">تایید</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>


</div>
