<div class="custom-dialog-container" dir="rtl">
  <h3 class="dialog-title"><strong>لغو دعوت</strong></h3>
  <hr style="background-color: black; padding: 1px" />

  <div class="dialog-text">آیا از لغو دعوت از نامزد اطمینان دارید؟</div>

  <div class="dialog-subtext">در صورت تایید توضیحات خود را ثبت نمایید</div>

  <form (ngSubmit)="f.form.valid && submit()" #f="ngForm">
    <!-- <div class="dialog-label">
      توضیحات <span class="required-star">*</span>
    </div>

    <textarea
      [(ngModel)]="description"
      #descriptionModel="ngModel"
      required
      rows="4"
      maxlength="2000"
      class="dialog-textarea"
      placeholder="علت لغو دعوت را وارد کنید"
    ></textarea>

    <div
      class="validation-text"
      *ngIf="descriptionModel.invalid && (descriptionModel.dirty || descriptionModel.touched)"
    >
      وارد کردن توضیحات الزامی است.
    </div> -->
    <div class="row form-group">
      <mat-form-field appearance="outline">
        <textarea
          matInput
          placeholder="علت لغو دعوت را وارد کنید"
          name="description"
          [(ngModel)]="description"
          #descriptionModel="ngModel"
          trim="blur"
          maxlength="2000"
          rows="4"
          required
        ></textarea>
        <mat-error *ngIf="f.submitted"> وارد کردن توضیحات الزامی است. </mat-error>
      </mat-form-field>
    </div>

    <!-- <div class="dialog-actions">
      <button
        class="btn-confirm"
        [disabled]="!description || !description.trim()"
      >
        ثبت
      </button>
      <button type="button" class="btn-close" (click)="close()">انصراف</button>
    </div> -->
    <mat-dialog-actions align="end">
      <div class="col-md-12" dir="rtl">
        <button type="submit" class="btn btn-primary w-10 p-2">
          ثبت <i class="fa fa-check"></i>
        </button>
        <button
          type="button"
          class="btn btn-danger w-10 p-2 ms-2"
          mat-dialog-close
        >
          انصراف <i class="fa fa-times"></i>
        </button>
      </div>
    </mat-dialog-actions>
  </form>
</div>
