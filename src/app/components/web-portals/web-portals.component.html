<div class="card form-group">
  <div class="card-body">
    <h4 class="mt-0 header-title">درگاه‌های اینترنتی</h4>
    <div class="row mt-4">
      <div class="col-md-6 col-xs-12 form-group">
        <div class="row">
          <label class="col-sm-2 col-form-label text-lg-center">عنوان</label>
          <div class="col-sm-10">
            <input class="form-control" type="text" name="title" [(ngModel)]="webPortal.title" />
          </div>
        </div>
      </div>

      <div class="col-md-6 col-xs-12 form-group">
        <div class="row">
          <label class="col-sm-2 col-form-label text-lg-center">آدرس</label>
          <div class="col-sm-10">
            <input class="form-control" type="url" name="url" [(ngModel)]="webPortal.URL" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="card-footer text-end">
    <button type="button" class="btn btn-primary w-10 p-2" (click)="insertURL()">
      ثبت <i class="fa fa-check"></i>
    </button>
    <button type="button" class="btn btn-danger w-10 p-2 ms-2" (click)=" resetForm()">
      انصراف <i class="fa fa-times"></i>
    </button>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <h4 class="mt-0 header-title">آدرس درگاه‌های اینترنتی ثبت شده</h4>
    <div class="table-responsive b-0 fixed-solution">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" width="100%" matSort>
        <!-- <ng-container matColumnDef="codeNum">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header> کد پیگیری </th>
                  <td mat-cell *matCellDef="let webPortal"> {{webPortal.codeNum}} </td>
              </ng-container> -->

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> عنوان درگاه اینترنتی </th>
          <td mat-cell *matCellDef="let webPortal"> {{webPortal.title}} </td>
        </ng-container>

        <ng-container matColumnDef="url">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> عنوان سایت </th>
          <td mat-cell *matCellDef="let webPortal"> <a href="{{webPortal.url}}" target="_blank">{{webPortal.url}}</a>
          </td>
        </ng-container>

        <ng-container matColumnDef="statusDesc">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> وضعیت </th>
          <td mat-cell *matCellDef="let webPortal"> {{webPortal.statusDesc}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> عملیات </th>
          <td mat-cell *matCellDef="let webPortal">
            <mat-icon (click)="deleteURL(webPortal)" color="warn">delete</mat-icon>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
    </div>
  </div>
</div>
