<div class="card form-group">
    <div class="card-body">
        <h4 class="mt-0 header-title">کانال‌ها و صفحات در شبکه‌های اجتماعی</h4>

        <div class="row mt-4">
            <div class="col-md-6 col-xs-12 form-group">
                <div class="row">
                    <label class="col-sm-2 col-form-label text-lg-center">نام شبکه</label>
                    <div class="col-sm-10">
                        <input class="form-control" type="text" [(ngModel)]="newSocialNetwork.title">
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-xs-12 form-group">
                <div class="row">
                    <label class="col-sm-2 col-form-label text-lg-center">آدرس</label>
                    <div class="col-sm-10">
                        <input class="form-control" type="url" [(ngModel)]="newSocialNetwork.url">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="card-footer text-end">
        <button type="button" class="btn btn-primary w-10 p-2" (click)="addSocialNetwork()">ثبت <i class="fa fa-check"></i></button>
        <button type="button" class="btn btn-danger w-10 p-2 ms-2" (click)="resetForm()">انصراف <i class="fa fa-times"></i></button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <h4 class="mt-0 header-title">کانال‌ها و صفحات شبکه‌های اجتماعی ثبت شده</h4>
        <div class="table-responsive b-0 fixed-solution">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" width="100%" matSort>
                <!-- <ng-container matColumnDef="codeNum">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> کد پیگیری </th>
                    <td mat-cell *matCellDef="let network"> {{network.codeNum}} </td>
                </ng-container> -->

                <ng-container matColumnDef="title">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> نام شبکه </th>
                    <td mat-cell *matCellDef="let network"> {{network.title}} </td>
                </ng-container>

                <ng-container matColumnDef="url">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> آدرس </th>
                    <td mat-cell *matCellDef="let network"> <a href="{{network.url}}" target="_blank">{{network.url}}</a> </td>
                </ng-container>

                <ng-container matColumnDef="statusDesc">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> وضعیت </th>
                    <td mat-cell *matCellDef="let network"> {{network.statusDesc}} </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> عملیات </th>
                    <td mat-cell *matCellDef="let network">
                      <mat-icon (click)="deleteSocialNetwork(network)" color="warn">delete</mat-icon> </td>
                  </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
        </div>
    </div>
</div>
